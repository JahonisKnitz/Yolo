<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yolo-v3</title>

<!-- Apple Web App (Home Screen) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YOLO">
<link rel="apple-touch-icon" href="icon.png">

<!-- Standard Favicon -->
<link rel="icon" type="image/png" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:wght@700&family=Righteous&family=Abril+Fatface&family=Black+Ops+One&family=Bangers&family=Boogaloo&family=Fredoka+One&family=Lilita+One&family=Titan+One&family=Russo+One&family=Press+Start+2P&family=Permanent+Marker&family=Pacifico&family=Ultra&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f4f6;
  --surface: #ffffff;
  --surface2: #eaeaef;
  --border: #d0d0da;
  --pink: #ff3dac;
  --violet: #9b3dff;
  --diamond: #3de8ff;
  --gold: #ffd700;
  --text: #111118;
  --muted: #888899;
  --col-red: #e03020;
  --col-yellow: #d4930a;
  --col-blue: #2a5ae8;
  --col-white: #999;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#ff2dac;
  color:var(--text);font-family:"DM Sans",sans-serif;
  min-height:100vh;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* Floating game container */
.phone-frame{
  position:relative;
  width:390px;
  max-height:calc(100vh - 40px);
  background:var(--bg);
  border-radius:20px;
  overflow:hidden;
  transform:translateZ(0);
  box-shadow:
    0 2px 0 rgba(255,255,255,.9),
    0 20px 60px rgba(0,0,0,.14),
    0 8px 24px rgba(0,0,0,.10);
  border:1px solid rgba(255,255,255,.8);
  flex-shrink:0;
}

/* On real phones: fill screen */
@media (max-width:430px){
  body{background:var(--bg);display:block;overflow:auto;}
  .phone-frame{
    width:100%;max-height:none;border-radius:0;
    box-shadow:none;border:none;overflow:visible;
  }
}

.phone-frame-inner{
  width:100%;
  max-height:calc(100vh - 40px);
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  position:relative;
}
.phone-frame-inner::-webkit-scrollbar{display:none;}

@media (max-width:430px){
  .phone-frame-inner{max-height:none;overflow:visible;}
}

/* LAYOUT */
.app{display:grid;grid-template-rows:auto auto auto auto;min-height:100%;gap:0;align-content:start;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(9,9,14,.9);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50;}
.logo{font-family:"Bebas Neue",sans-serif;font-size:32px;letter-spacing:.15em;background:linear-gradient(135deg,var(--pink),var(--violet),var(--diamond));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.turn-badge{font-family:"Bebas Neue",sans-serif;font-size:14px;letter-spacing:.15em;padding:6px 16px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
.turn-badge.your-turn{border-color:#b8960a;background:transparent;color:#b8960a;font-weight:700;text-shadow:none;box-shadow:none;}
.turn-badge.cpu-turn{border-color:var(--violet);color:var(--violet);}

/* SCORES */
.scorebar{display:flex;align-items:center;justify-content:center;gap:0;padding:5px 16px;background:#e8e8ed;border-bottom:1px solid var(--border);}
.player-score{display:flex;align-items:center;gap:6px;flex:1;}
.player-score.cpu{flex-direction:row-reverse;}
.player-name{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
.player-name-row{display:flex;align-items:center;gap:4px;}
.player-name-row.cpu-row{flex-direction:row-reverse;}
.player-dia-pips{display:flex;gap:2px;align-items:center;flex-wrap:nowrap;}
.pdpip{width:7px;height:7px;border-radius:1px;background:rgba(255,255,255,.9);box-shadow:none;transition:all .3s;}
.pdpip.p2{background:rgba(255,255,255,.9);box-shadow:0 0 4px rgba(255,255,255,.4);}
.pdpip-empty{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);box-shadow:none;}
.vs-divider{text-align:center;font-family:"Bebas Neue",sans-serif;font-size:15px;color:var(--muted);letter-spacing:.1em;padding:0 10px;}
.deck-info{font-size:10px;color:var(--muted);text-align:center;margin-top:2px;}

/* MAIN AREA */
.main{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.panel{padding:7px;border-right:1px solid var(--border);background:var(--surface);}
.panel.cpu-panel{border-right:none;}
.panel.cpu-panel .tableau{justify-content:flex-end;}
.panel.cpu-panel .tableau-col{align-items:stretch;}
.panel.cpu-panel .t-card{text-align:center;}
.panel.cpu-panel .t-card-placeholder{width:100%;}
.panel-title{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

/* TABLEAUX */
.tableau{display:flex;gap:6px;min-height:105px;}
.tableau-col{display:flex;flex-direction:column;gap:3px;min-width:40px;flex:1;}
.tableau-col-header{display:none;}
.col-red{background:var(--col-red);}
.col-yellow{background:var(--col-yellow);}
.col-blue{background:var(--col-blue);}
.col-white{background:var(--col-white);}
.t-card-placeholder{border-radius:4px;padding:2px 4px;min-height:20px;box-sizing:border-box;width:100%;}
.t-card-placeholder.ph-red{border:1.5px dashed rgba(224,48,32,.4);}
.t-card-placeholder.ph-yellow{border:1.5px dashed rgba(212,147,10,.4);}
.t-card-placeholder.ph-blue{border:1.5px dashed rgba(42,90,232,.4);}

/* Tableau-Karten im YOLO-Look: weißer Rand + farbige Innenfläche */
.t-card{
  border-radius:5px;
  padding:1px;
  font-family:"Bebas Neue",sans-serif;
  font-size:12px;
  text-align:center;
  border:none;
  width:100%;
  box-sizing:border-box;
  background:#fff;
  box-shadow:0 1px 0 rgba(0,0,0,.22),0 2px 4px rgba(0,0,0,.14);
  overflow:hidden;
  position:relative;
}
/* Innenfläche per ::after */
.t-card::before{
  content:attr(data-pts);
  display:block;
  border-radius:3px;
  padding:2px 3px;
  font-family:"Bebas Neue",sans-serif;
  font-size:12px;
  position:relative;z-index:1;
}
.t-card.red  {color:#fff;}
.t-card.red::before  {background:#e03030;}
.t-card.yellow{color:#fffae0;}
.t-card.yellow::before{background:#d4930a;}
.t-card.blue {color:#fff;}
.t-card.blue::before {background:#2e5ce8;}
.t-card.white{color:#00c8c0;}
.t-card.white::before{background:#eef8ff;}

/* Dot-Textur auf Tableau-Karten */
.t-card::after{
  content:"";position:absolute;inset:1px;border-radius:3px;
  pointer-events:none;z-index:2;opacity:.18;
  background-image:radial-gradient(circle,rgba(255,255,255,.8) 0.8px,transparent 0.8px);
  background-size:4px 4px;
}
.t-card.yellow::after{
  background-image:linear-gradient(45deg,rgba(255,255,255,.5) 1px,transparent 1px),linear-gradient(-45deg,rgba(255,255,255,.5) 1px,transparent 1px);
  background-size:5px 5px;
}
.t-card.blue::after{
  background-image:radial-gradient(circle,rgba(255,255,255,.7) 0.8px,transparent 0.8px),radial-gradient(circle,rgba(255,255,255,.3) 0.4px,transparent 0.4px);
  background-size:7px 7px,4px 4px;
  background-position:0 0,2px 2px;
}
.t-card.white::after{opacity:0;}

.row-complete{outline:1px solid rgba(255,215,0,.4);border-radius:3px;}

/* BONUSES */
.bonuses-area{padding:10px 16px;background:var(--surface);}
.bonus-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;min-height:88px;}
.bonus-card{
  border-radius:8px;padding:6px 8px;
  border:1px solid var(--border);
  background:linear-gradient(135deg,#f8f8fa 0%,#efefef 100%);
  display:flex;justify-content:space-between;align-items:center;gap:6px;
  box-shadow:0 1px 0 rgba(0,0,0,.16),0 3px 8px rgba(0,0,0,.07),0 1px 0 rgba(255,255,255,.9) inset;
  position:relative;overflow:hidden;
  transition:box-shadow .2s,transform .2s;
}
/* Coloured left stripe */
.bonus-card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px;
}
.bonus-card.sofort::before{background:linear-gradient(180deg,var(--pink),var(--violet));}
.bonus-card.langzeit::before{background:linear-gradient(180deg,var(--gold),#e8a800);}
.bonus-card.sofort{border-style:solid;}
.bonus-card.langzeit{border-style:solid;grid-column:1/-1;}
.bonus-card.earned-you{
  border-color:var(--gold);
  background:linear-gradient(135deg,rgba(255,215,0,.14) 0%,rgba(255,215,0,.06) 100%);
  box-shadow:0 1px 0 rgba(0,0,0,.16),0 3px 8px rgba(255,215,0,.15),0 0 0 1px rgba(255,215,0,.2) inset;
}
.bonus-card.earned-cpu{
  border-color:var(--violet);
  background:linear-gradient(135deg,rgba(155,61,255,.12) 0%,rgba(155,61,255,.05) 100%);
  box-shadow:0 1px 0 rgba(0,0,0,.16),0 3px 8px rgba(155,61,255,.15),0 0 0 1px rgba(155,61,255,.2) inset;
}
.bonus-type{
  font-size:7px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:1px;
}
.bonus-card.sofort .bonus-type{color:var(--pink);}
.bonus-card.langzeit .bonus-type{color:#b8960a;}
.bonus-desc{font-size:9.5px;color:var(--text);line-height:1.25;font-weight:500;}
.bonus-pts{
  font-family:"Bebas Neue",sans-serif;font-size:20px;color:#00c8c0;
  white-space:nowrap;line-height:1;
  text-shadow:0 1px 0 rgba(255,255,255,.8),0 2px 4px rgba(0,180,170,.2);
}
.bonus-card.earned-you .bonus-pts{color:var(--gold);}
.bonus-card.earned-cpu .bonus-pts{color:var(--violet);}
.bonus-owner{font-size:7px;letter-spacing:.05em;margin-top:2px;font-weight:700;}

/* PLAY AREA */
.play-area{padding:14px 20px 16px;background:var(--surface);}

/* CARDS ROW */
.cards-row{display:flex;gap:14px;margin-bottom:22px;justify-content:center;align-items:flex-end;}

/* ── KARTEN: Echter YOLO-Look ── */
.card{
  width:108px;
  border-radius:10px;
  overflow:hidden;
  border:none;
  cursor:default;
  position:relative;
  background:#fff;
  padding:5px 5px 5px 5px;
  box-shadow:0 2px 0 rgba(0,0,0,.28),0 3px 0 rgba(0,0,0,.11),0 4px 10px rgba(0,0,0,.22);
  transition:box-shadow .25s,transform .2s;
}
.card.won{opacity:.38;pointer-events:none;}
.card:not(.won):not(.puff-out):hover{animation:card-wobble .35s ease;}
@keyframes card-wobble{0%{transform:rotate(var(--card-rot,0deg));}25%{transform:rotate(calc(var(--card-rot,0deg) + 3deg)) translateY(-3px);}75%{transform:rotate(calc(var(--card-rot,0deg) - 2deg)) translateY(-2px);}100%{transform:rotate(var(--card-rot,0deg));}}
.card.flash-match{animation:flash-card .6s ease;}
.card.card-highlighted{
  transform:scale(1.12) translateY(-10px) rotate(var(--card-rot,0deg)) !important;
  box-shadow:0 20px 48px rgba(0,0,0,.40),0 3px 0 rgba(0,0,0,.28),0 0 0 3px rgba(255,255,255,.9);
  z-index:100;
  position:relative;
  transition:transform .25s cubic-bezier(.22,1.4,.36,1), box-shadow .25s ease !important;
}
@keyframes flash-card{
  0%  {transform:scale(1) rotate(var(--card-rot,0deg));filter:brightness(1);}
  30% {transform:scale(1.15) translateY(-8px) rotate(var(--card-rot,0deg));box-shadow:0 20px 50px rgba(255,215,0,.7),0 4px 0 rgba(0,0,0,.25);filter:brightness(1.35);}
  65% {transform:scale(1.08) translateY(-4px) rotate(var(--card-rot,0deg));filter:brightness(1.15);}
  100%{transform:scale(1) rotate(var(--card-rot,0deg));filter:brightness(1);}
}

/* Innere farbige Fläche */
.card-inner{
  border-radius:6px;
  overflow:hidden;
  position:relative;
  width:100%;
}
.card[data-color=red]    .card-inner{background:#e03030;}
.card[data-color=yellow] .card-inner{background:#f0c018;}
.card[data-color=blue]   .card-inner{background:#2e5ce8;}
.card[data-color=white]  .card-inner{background:#eef8ff;}

/* Farb-Muster */
.card-inner::before{
  content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
}
/* ROT – klassische Halbton-Punkte */
.card[data-color=red] .card-inner::before{
  background-image:radial-gradient(circle,rgba(255,255,255,.65) 1.2px,transparent 1.2px);
  background-size:7px 7px;
  opacity:.25;
}
/* GELB – diagonales Kreuzraster */
.card[data-color=yellow] .card-inner::before{
  background-image:
    linear-gradient(45deg,rgba(255,255,255,.5) 1px,transparent 1px),
    linear-gradient(-45deg,rgba(255,255,255,.5) 1px,transparent 1px);
  background-size:8px 8px;
  opacity:.3;
}
/* BLAU – Sternchen / Konfetti-Punkte in zwei Größen */
.card[data-color=blue] .card-inner::before{
  background-image:
    radial-gradient(circle,rgba(255,255,255,.8) 1.5px,transparent 1.5px),
    radial-gradient(circle,rgba(255,255,255,.4) 0.7px,transparent 0.7px);
  background-size:12px 12px, 6px 6px;
  background-position:0 0, 3px 3px;
  opacity:.25;
}
/* WEISS – Schimmer-Animation */
.card[data-color=white] .card-inner::before{
  background:linear-gradient(
    115deg,
    transparent 0%,
    transparent 30%,
    rgba(255,255,255,0) 38%,
    rgba(255,255,255,.72) 50%,
    rgba(200,240,255,.45) 54%,
    transparent 62%,
    transparent 100%
  );
  background-size:250% 100%;
  background-position:200% 0;
  opacity:1;
  animation:card-shimmer 6s linear infinite;
}
@keyframes card-shimmer{
  0%   {background-position:200% 0;}
  100% {background-position:-100% 0;}
}

/* Glass button shimmer */
.glass-btn{position:relative;overflow:hidden;}
.glass-btn::after{
  content:"";
  position:absolute;inset:0;
  border-radius:inherit;
  background:linear-gradient(
    115deg,
    transparent 0%,
    transparent 30%,
    rgba(255,255,255,0) 38%,
    rgba(255,255,255,.45) 50%,
    rgba(255,255,255,.22) 54%,
    transparent 62%,
    transparent 100%
  );
  background-size:250% 100%;
  background-position:200% 0;
  animation:card-shimmer 5s linear infinite;
  pointer-events:none;
}

/* yolo pill */
.card-yolo-lbl{
  font-family:"DM Sans",sans-serif;font-weight:700;font-size:8px;letter-spacing:.02em;
  background:rgba(255,255,255,.93);border-radius:20px;padding:2px 6px;
  color:#333;position:absolute;top:6px;left:6px;z-index:5;
  box-shadow:0 1px 4px rgba(0,0,0,.18);
}
/* Punkte-Ecke */
.card-pts-corner{
  font-family:"Bebas Neue",sans-serif;font-size:14px;
  color:rgba(255,255,255,.92);
  position:absolute;top:4px;right:6px;z-index:5;
  text-shadow:0 1px 3px rgba(0,0,0,.35);
}
.card[data-color=white] .card-pts-corner{color:rgba(50,100,120,.6);}

/* Riesige Zahl */
.card-pts{
  font-family:"Bebas Neue",sans-serif;font-size:74px;line-height:.95;
  color:#fff;text-align:center;display:block;
  position:relative;z-index:2;
  padding:22px 4px 6px;
  text-shadow:3px 5px 0 rgba(0,0,0,.18),5px 8px 0 rgba(0,0,0,.08);
}
.card[data-color=yellow] .card-pts{color:#fffae0;text-shadow:3px 5px 0 rgba(120,70,0,.20);}
.card[data-color=white]  .card-pts{color:#00c8c0;text-shadow:2px 4px 0 rgba(0,80,80,.15);}
.card-ptslbl{display:none;}
.card-div{display:none;}

/* Sprechblasen-Kombo */
.card-bot{padding:0 4px 8px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;margin-top:2px;}
.card-combo{
  display:flex;gap:4px;align-items:center;justify-content:center;
  background:#fff;border-radius:14px;padding:5px 7px;position:relative;
  box-shadow:0 3px 8px rgba(0,0,0,.22),0 1px 0 rgba(255,255,255,.9) inset;
}
.card-combo::before{
  content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  border-left:5px solid transparent;border-right:5px solid transparent;border-bottom:7px solid #fff;
}

/* Würfelkacheln */
.md{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",sans-serif;font-size:12px;background:#efefef;border:1.5px solid rgba(0,0,0,.10);box-shadow:0 2px 0 rgba(0,0,0,.16),0 1px 0 rgba(255,255,255,.8) inset;flex-shrink:0;}
.md.ltr{background:#f4f4f4;color:#1a1a1a;}
.md.pink{background:#f4f4f4;color:var(--pink);font-size:18px;}
.md.vio{background:#f4f4f4;color:var(--violet);font-size:18px;}
.md.dia{background:#f4f4f4;color:#00c0a8;}

.mp{font-size:7px;color:var(--muted);}
.card-dots{display:none;}
.cdot{width:5px;height:5px;border-radius:1px;opacity:.6;}
.won-overlay{position:absolute;inset:0;background:rgba(0,0,0,.50);display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",sans-serif;font-size:13px;color:var(--gold);opacity:0;transition:opacity .3s;border-radius:10px;pointer-events:none;z-index:10;}
.card{position:relative;}
.card.won .won-overlay{opacity:1;}

/* YOLO strip */
.yolo-strip{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:7px;margin-bottom:12px;margin-top:4px;background:linear-gradient(135deg,#c4930a,var(--gold),#e8a800);border:none;box-shadow:0 2px 0 rgba(0,0,0,.28),0 3px 8px rgba(0,0,0,.18);outline:none;transition:background .5s ease,box-shadow .5s ease;}
.yolo-strip.p2-strip{background:linear-gradient(135deg,var(--violet),var(--pink));}
.yolo-player-info{display:flex;flex-direction:column;gap:3px;}
.yolo-player-name{font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:.15em;font-weight:900;color:#ffffff;transition:color .5s ease;}
.yolo-strip.p2-strip .yolo-player-name{color:#ffffff;}
.yolo-player-dias{display:flex;gap:2px;align-items:center;min-height:7px;}
.yolo-right{display:flex;align-items:center;gap:8px;}.yolo-strip.matched{box-shadow:0 2px 0 rgba(0,0,0,.28),0 3px 8px rgba(0,0,0,.18),0 0 24px rgba(255,215,0,.5)!important;}
.yolo-lbl{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.2em;color:#fff;}
.yolo-sub{font-size:9px;color:rgba(255,255,255,.75);}
.yolo-dice{display:flex;gap:3px;}

/* DICE */
.dice-row{display:flex;gap:0;justify-content:center;margin-bottom:10px;margin-top:14px;align-items:flex-start;height:88px;overflow:visible;}
.die-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;perspective:200px;}
.die-scene{width:60px;height:60px;perspective:200px;}
.die{width:60px;height:60px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.34,1.56,.64,1);user-select:none;}
.die-face{position:absolute;width:60px;height:60px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.15);backface-visibility:hidden;}
.die-face.front {background:radial-gradient(ellipse 40% 35% at 25% 20%, rgba(255,255,255,.95) 0%, rgba(255,255,255,0) 100%),radial-gradient(ellipse 25% 20% at 78% 75%, rgba(255,255,255,.4) 0%, rgba(255,255,255,0) 100%),linear-gradient(145deg, #f8f8f8 0%, #ebebeb 55%, #dcdcdc 100%);box-shadow:0 12px 32px rgba(0,0,0,.25),0 4px 10px rgba(0,0,0,.15),0 1px 0 rgba(255,255,255,1) inset;transform:translateZ(30px);transition:filter .4s ease;}
.die-face.back  {background:linear-gradient(145deg,#e8e8e8,#d8d8d8);transform:rotateY(180deg) translateZ(30px);}
.die-face.right {background:linear-gradient(145deg,#e0e0e0,#cccccc);transform:rotateY(90deg) translateZ(30px);}
.die-face.left  {background:linear-gradient(145deg,#ebebeb,#d8d8d8);transform:rotateY(-90deg) translateZ(30px);}
.die-face.top   {background:linear-gradient(145deg,#f2f2f2,#e2e2e2);transform:rotateX(90deg) translateZ(30px);}
.die-face.bottom{background:linear-gradient(145deg,#d8d8d8,#c8c8c8);transform:rotateX(-90deg) translateZ(30px);}
.die:hover:not(.empty){transform:translateY(-2px);}

.die[data-face=Y],.die[data-face=L],.die[data-face=O]{background:#ffffff;border-color:rgba(0,0,0,.18);box-shadow:0 3px 12px rgba(61,232,255,.12);}

.die[data-face=Y] .die-sym,.die[data-face=L] .die-sym,.die[data-face=O] .die-sym{color:#111118;}
.die[data-face="◆"] .die-sym{color:#00c0a8;font-size:22px;font-family:"Bebas Neue",sans-serif;}
.die[data-face=P] .die-sym{color:var(--pink);font-size:56px;}
.die[data-face=V] .die-sym{color:var(--violet);font-size:56px;}
.held-badge{position:absolute;top:-6px;right:-6px;font-size:6px;font-weight:700;padding:2px 4px;border-radius:6px;display:none;}
.die-wrap.p1 .held-badge{background:var(--gold);color:#000;}
.die-wrap.p2 .held-badge{background:var(--violet);color:#fff;}
.die.held .held-badge{display:block;z-index:10;}
.die-lbl{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.die-wrap.p1.held-w .die-lbl{color:var(--gold);}
.die-wrap.p2.held-w .die-lbl{color:var(--violet);}

/* CONTROLS */
.controls{display:flex;flex-direction:column;align-items:center;gap:8px;}
.pips-row{display:flex;gap:6px;align-items:center;justify-content:center;}
.pip-lbl{font-size:9px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-right:2px;}
.pip{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s;}
.pip.used{background:#cccccc;box-shadow:none;}
.pip.active{background:var(--gold);box-shadow:0 0 5px rgba(255,215,0,.6);}
.pip.active.p2{background:var(--violet);box-shadow:0 0 5px rgba(155,61,255,.6);}


.btn-roll{background:linear-gradient(135deg,var(--violet),var(--pink));border:none;color:white;font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.15em;padding:10px 40px;border-radius:7px;cursor:pointer;transition:transform .12s,box-shadow .2s;box-shadow:0 3px 16px rgba(155,61,255,.25);animation:btn-pulse-p2 2.4s ease-in-out infinite;}
@keyframes btn-pulse-p2{0%,100%{box-shadow:0 3px 16px rgba(155,61,255,.25);}50%{box-shadow:0 4px 22px rgba(155,61,255,.55),0 0 0 4px rgba(155,61,255,.12);}}
@keyframes btn-pulse-p1{0%,100%{box-shadow:0 3px 16px rgba(196,147,10,.30);}50%{box-shadow:0 4px 22px rgba(255,215,0,.60),0 0 0 4px rgba(255,215,0,.12);}}
.btn-roll:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 24px rgba(155,61,255,.45);}
.btn-roll:disabled{opacity:.28;cursor:not-allowed;transform:none;box-shadow:none;animation:none;}
.hint{font-size:9px;color:var(--muted);letter-spacing:.05em;margin-bottom:8px;text-align:center;}

/* STATUS */
.status-bar{text-align:center;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;}
.status-msg{font-size:12px;color:var(--muted);}
.result-banner{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:.2em;opacity:0;transition:opacity .35s,transform .35s;transform:translateY(6px);}
.result-banner.show{opacity:1;transform:translateY(0);}
.result-banner.yolo-r{background:linear-gradient(90deg,var(--gold),var(--pink),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:34px;animation:ypulse 1s ease-in-out infinite alternate;}
@keyframes ypulse{from{filter:drop-shadow(0 0 10px rgba(255,215,0,.4))}to{filter:drop-shadow(0 0 28px rgba(255,215,0,.8))}}





.dot{width:6px;height:6px;border-radius:50%;background:var(--violet);animation:blink 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}


/* GAME OVER */
.game-over-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;}
.game-over-modal.show{display:flex;}
.game-over-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 48px;text-align:center;max-width:400px;width:90%;}
.go-title{font-family:"Bebas Neue",sans-serif;font-size:48px;letter-spacing:.1em;margin-bottom:8px;}
.go-title.win{background:linear-gradient(135deg,var(--gold),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.go-title.lose{color:var(--muted);}
.go-title.draw{color:var(--diamond);}
.go-scores{display:flex;gap:32px;justify-content:center;margin:20px 0;}
.go-score-item{text-align:center;}
.go-score-num{font-family:"Bebas Neue",sans-serif;font-size:42px;color:var(--gold);display:block;}
.go-score-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.go-details{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.btn-new-game{background:linear-gradient(135deg,var(--violet),var(--pink));border:none;color:white;font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.12em;padding:12px 36px;border-radius:8px;cursor:pointer;}

.die.shake{animation:shake .45s ease;}
@keyframes shake{0%{transform:translateX(0)}15%{transform:translateX(-6px)rotate(-4deg)}30%{transform:translateX(6px)rotate(3deg)}45%{transform:translateX(-5px)rotate(-2deg)}60%{transform:translateX(4px)rotate(2deg)}75%{transform:translateX(-3px)}90%{transform:translateX(2px)}100%{transform:translateX(0)}}

.score-change{animation:score-pop .75s cubic-bezier(.22,1.4,.36,1);}
@keyframes score-pop{
  0%  {transform:scale(1)    translateY(0);}
  20% {transform:scale(1.7)  translateY(-10px);color:var(--gold);filter:drop-shadow(0 0 14px rgba(255,215,0,.8));}
  55% {transform:scale(.88)  translateY(2px);color:var(--gold);}
  75% {transform:scale(1.12) translateY(-2px);}
  100%{transform:scale(1)    translateY(0);filter:none;}
}

.bonus-card.just-earned{animation:bonus-pop .6s ease;}
@keyframes bonus-pop{0%{transform:scale(1)}30%{transform:scale(1.06);box-shadow:0 0 20px rgba(255,215,0,.4);}100%{transform:scale(1)}}

.t-card{transition:all .3s ease;}
.t-card.new-card{animation:card-bounce-in .65s cubic-bezier(.22,1.4,.36,1) both;}
@keyframes card-bounce-in{0%{opacity:0;transform:scale(0.2) translateY(-18px);}55%{opacity:1;transform:scale(1.18) translateY(2px);}75%{transform:scale(0.94);}90%{transform:scale(1.05);}100%{transform:scale(1) translateY(0);}}

/* Play-area card puff out */
.card.puff-out{animation:card-puff-out .5s cubic-bezier(.4,0,.6,1) forwards;pointer-events:none;}
@keyframes card-puff-out{0%{transform:scale(1) rotate(var(--card-rot,0deg));opacity:1;}40%{transform:scale(1.25) rotate(calc(var(--card-rot,0deg) + 8deg)) translateY(-12px);opacity:1;}100%{transform:scale(0) rotate(calc(var(--card-rot,0deg) - 15deg)) translateY(-20px);opacity:0;}}

/* New card slide-in in play area */
.card.slide-in{animation:card-slide-in .55s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes card-slide-in{0%{opacity:0;transform:scale(.55) translateY(-30px) rotate(var(--card-rot,0deg));}65%{opacity:1;transform:scale(1.06) translateY(3px) rotate(var(--card-rot,0deg));}100%{opacity:1;transform:scale(1) translateY(0) rotate(var(--card-rot,0deg));}}

.player-pts{transition:all .2s ease;font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;}

/* Deck low warning */
.deck-low{color:var(--pink)!important;animation:deck-pulse 1.5s ease-in-out infinite;}
@keyframes deck-pulse{0%,100%{opacity:1}50%{opacity:.5}}

    picked.push(pool.splice(idx,1)[0]);
  }
  'YOLO'.split('').forEach((letter, i) => {
    const {f, style} = picked[i];

const DIA_SVG_LG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><polygon points="12,2 22,9 12,22 2,9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><polygon points="2,9 7,9 12,2" fill="currentColor" opacity="0.5"/><polygon points="22,9 17,9 12,2" fill="currentColor" opacity="0.85"/><polygon points="7,9 12,9 12,22" fill="currentColor" opacity="0.7"/><polygon points="17,9 12,9 12,22" fill="currentColor" opacity="1"/><line x1="2" y1="9" x2="22" y2="9" stroke="currentColor" stroke-width="1.4"/></svg>`;

const FACES = ['Y','L','O','◆','P','V'];
const COLORS_HEX = {red:'#e03020',yellow:'#d4930a',blue:'#2a5ae8',white:'#999'};

const COMBOS = {
  r2:['P','Y'],y2:['P','L'],b2:['P','O'],

};

const CARD_POOL = [
  {color:'red',pts:2,combo:'r2'},{color:'red',pts:2,combo:'r2'},

const ALL_SOFORT = [

];

function pickBonuses(){
  const sofort = shuffle([...ALL_SOFORT]).slice(0,2);
  const langzeit = shuffle([...ALL_LANGZEIT]).slice(0,1);
  return [...sofort, ...langzeit];
}

let BONUSES = [];

let deck=[], table=[], dice=[], tableRotations=[], attempts=0, newTableSlots=new Set(), gameOver=false, turnPhase='player';

function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function facesMatch(comboKey, diceArr){
  const needed=[...COMBOS[comboKey]];
  const avail=[...diceArr];
  for(const sym of['◆','P','V','Y','L','O']){
    needed.forEach((s,ni)=>{
      if(s!==sym)return;
      const fi=avail.findIndex(f=>f===sym);
      if(fi>=0){avail[fi]=null;needed[ni]=null;}
    });
  }
  return needed.every(n=>n===null);
}

function isYolo(diceArr){return [...diceArr].sort().join('')==='LOOY';}

// ── BONUS CHECK ──
function checkBonus(bonusId, tableau){
  const cols=['red','yellow','blue'];
  const all=cols.flatMap(c=>tableau[c]||[]);
  const twoDidCombos=new Set(['r2','y2','b2','c4','r6','y6','b6']);
  const maxCol=()=>Math.max(0,...cols.map(c=>(tableau[c]||[]).length));

  if(bonusId==='S1') return all.filter(c=>twoDidCombos.has(c.combo)).length>=5;
  if(bonusId==='S2') return maxCol()>=5;
  if(bonusId==='S3') return all.filter(c=>c.color==='white').length>=3;
  if(bonusId==='S4') return all.filter(c=>c.pts<4).length>=3;
  if(bonusId==='S5') return all.filter(c=>c.color==='yellow').length>=4;
  if(bonusId==='S6'){
    // Complete row with no white card
    const maxR=maxCol();
    for(let r=0;r<maxR;r++){
      const row=cols.map(c=>(tableau[c]||[])[r]);
      if(row.every(c=>c&&c.color!=='white')) return true;
    }
    return false;
  }
  if(bonusId==='S7') return all.filter(c=>c.pts>=8).length>=2;
  if(bonusId==='S8') return ['red','yellow','blue','white'].every(col=>all.some(c=>c.color===col));
  if(bonusId==='S9') return all.length>=6;
  if(bonusId==='S10'){
    const pts=new Set(all.map(c=>c.pts));
    for(let s=2;s<=5;s++) if([0,1,2,3,4].every(i=>pts.has(s+i))) return true;
    return false;
  }
  if(bonusId==='S11') return maxCol()>=4;
  if(bonusId==='L1') return all.filter(c=>c.color==='yellow').length;
  if(bonusId==='L2') return maxCol();
  if(bonusId==='L3') return all.filter(c=>c.color==='blue').length;
  if(bonusId==='L4') return all.filter(c=>c.color==='red').length;
  if(bonusId==='L5') return all.filter(c=>c.pts<=3).length;
  return 0;
}

function scoreTableau(tableau){
  // White cards are already placed in color columns - score complete rows directly
  const cols=['red','yellow','blue'];
  const maxR=Math.max(0,...cols.map(c=>(tableau[c]||[]).length));
  let total=0;
  for(let r=0;r<maxR;r++){
    const row=cols.map(c=>(tableau[c]||[])[r]).filter(Boolean);
    if(row.length===3) total+=row.reduce((s,c)=>s+c.pts,0);
  }
  return total;
}

function countRows(tableau){
  const cols=['red','yellow','blue'];
  const maxR=Math.max(0,...cols.map(c=>(tableau[c]||[]).length));
  let complete=0;
  for(let r=0;r<maxR;r++){
    const row=cols.map(c=>(tableau[c]||[])[r]).filter(Boolean);
    if(row.length===3) complete++;
  }
  return complete;
}

// ── PLACEMENT ──
function placeCard(tableau, card){
  if(card.color === 'white'){
    // White goes to shortest color column (random on tie)
    const cols = ['red','yellow','blue'];
    const lens = cols.map(c=>(tableau[c]||[]).length);
    const minLen = Math.min(...lens);
    const candidates = cols.filter((_,i)=>lens[i]===minLen);
    const target = candidates[Math.floor(Math.random()*candidates.length)];
    if(!tableau[target]) tableau[target]=[];
    // Mark as white so we can style it differently
    tableau[target].push({...card, placedAs: target});
  } else {
    if(!tableau[card.color]) tableau[card.color]=[];
    tableau[card.color].push(card);
  }
}

// ── SOFORT BONUS CHECK (called after each card placed) ──
function checkSofortBonuses(who){
  const tab = who==='you' ? youTableau : cpuTableau;
  BONUSES.filter(b=>b.type==='sofort').forEach(b=>{
    if(bonusState[b.id]) return; // already awarded
    if(checkBonus(b.id, tab)){
      bonusState[b.id]=who;
      showMsg(`${who==='you'?'Du':'CPU'} kassiert Sofortbonus: ${b.desc} (+${b.pts} Pts)!`);
    }
  });
}

function renderCards(){

    el.style.transform='rotate('+rot+'deg)';
    el.style.setProperty('--card-rot', rot+'deg');

    // Won overlay (on outer card)
    const wo=document.createElement('div');wo.className='won-overlay';wo.textContent='✓';
    el.appendChild(wo);

    const inner=document.createElement('div');inner.className='card-inner';

    inner.appendChild(ptsCorner);

    const bot=document.createElement('div');bot.className='card-bot';

    COMBOS[card.combo].forEach((sym)=>{
      combo.appendChild(makeMiniDie(sym));
    });
    bot.appendChild(combo);
    inner.appendChild(bot);

    el.appendChild(inner);
    row.appendChild(el);

}

function makeMiniDie(sym){
  const d=document.createElement('div');
  if(sym==='P') d.className='md pink', d.textContent='●';
  else if(sym==='V') d.className='md vio', d.textContent='●';
  else if(sym==='◆'){d.className='md dia';d.innerHTML=DIA_SVG_SM;}
  else{ d.className='md ltr'; if(sym==='Y'||sym==='L'||sym==='O') d.classList.add('ltr-'+sym); d.textContent=sym; }
  return d;
}

function makeFace(cls, face){
  const f=document.createElement('div');
  f.className='die-face '+cls;
  if(cls==='front' && face){
    const sym=document.createElement('div');
    sym.className='die-sym';
    if(face==='◆'){sym.innerHTML=DIA_SVG_LG;sym.style.fontSize='0';}
    else{const fc=(face==='P'||face==='V'?'●':face);sym.textContent=fc;}
    if(face==='Y'||face==='L'||face==='O') sym.classList.add('die-sym-'+face);
    f.appendChild(sym);
  }
  return f;
}

function renderDice(){
  const row=document.getElementById('diceRow');
  row.innerHTML='';
  dice.forEach((d,i)=>{
    const wrap=document.createElement('div');
    const pCls = turnPhase==='player' ? ' p1' : ' p2';
    wrap.className='die-wrap'+pCls+(d.held?' held-w':'');
    wrap.style.marginLeft = dicePosH[i]+'px';
    wrap.style.transform = 'translateY('+dicePosV[i]+'px)';

    const isActiveTurn = turnPhase==='player' || (gameMode==='human' && turnPhase==='cpu');
    const die=document.createElement('div');
    die.className='die'+(d.held?' held':'')+((!d.face)?' empty':'')+(((diceOwner!==turnPhase)&&d.face)?' inactive':'');
    if(d.face) die.setAttribute('data-face',d.face);
    die.onclick=()=>toggleHold(i);

    // 3D faces
    ['front','back','right','left','top','bottom'].forEach(side=>{
      die.appendChild(makeFace(side, side==='front'?d.face:null));
    });

    // held badge on top of front face
    const badge=document.createElement('div');badge.className='held-badge';badge.textContent='HALT';
    die.appendChild(badge);

    // Apply landing rotation + scale für inactive/empty
    const rot = d.face ? diceRotation[i] : 0;
    const diceActive = (diceOwner===turnPhase);
    const sc = (!diceActive || !d.face) ? 0.8 : 1;
    die.style.transform = `rotateX(${rot*0.3}deg) rotateZ(${rot}deg) scale(${sc})`;

    const lbl=document.createElement('div');lbl.className='die-lbl';lbl.textContent=d.held?'Gehalten':'Halten';
    wrap.appendChild(die);wrap.appendChild(lbl);
    row.appendChild(wrap);
  });
}

  cpuEl.textContent=newCpu;

// ── PLAYER ACTIONS ──
function toggleHold(i){
  if(attempts===0||gameOver||attempts>=3)return;
  dice[i].held=!dice[i].held;
  if(dice[i].held) playHold(); else playRelease();
  renderDice();
}

function playerRoll(){
  if(gameOver||attempts>=3)return;
  playRoll();
  // Neue Würfelwerte und Rotationen sofort berechnen
  diceOwner=turnPhase;
  dice.forEach((d,i)=>{
    if(!d.held){
      d.face=rnd(FACES);
      diceRotation[i]=(Math.random()*10-5);
      dicePosH[i]= i===0 ? 10 : (10 + Math.floor(Math.random()*22));
      dicePosV[i]= Math.floor(Math.random()*14);
    }
  });
  attempts++;

  // Würfel rendern (zeigen neues Ergebnis)
  render();

  // Rolling-Klasse hinzufügen (überschreibt transform kurzzeitig mit Animation)
  const dieEls=document.querySelectorAll('.die');
  dice.forEach((d,i)=>{
    if(!d.held){
      const delay=i*60; // individueller Versatz: 0, 60, 120, 180ms
      setTimeout(()=>{
        const dur = (0.85 + Math.random()*0.3).toFixed(2);
        if(dieEls[i]) dieEls[i].style.animationDuration = dur+'s';
        dieEls[i]?.classList.add('rolling-'+i);
      }, delay);
      // Nach Animation: rolling entfernen → transition springt auf diceRotation (mit Bounce)
      setTimeout(()=>{
        dieEls[i]?.classList.remove('rolling-'+i);
        if(dieEls[i]){
          const r=diceRotation[i];
          dieEls[i].style.transform=`rotateX(${r*0.3}deg) rotateZ(${r}deg) scale(1)`;

        }
      }, 1000+delay);
    }
  });

  // Ergebnis erst nach Animation prüfen
  setTimeout(()=>checkPlayerResult(),1050);
}

function checkPlayerResult(){
  const faces=dice.map(d=>d.face);
  const isP2turn = (gameMode==='human' && turnPhase==='cpu');

  // YOLO?
  if(isYolo(faces)){
    if(false){ // removed YOLO variant mode
      if(attempts>=3){
        playMiss();
        document.querySelectorAll('.die').forEach(d=>{d.classList.add('shake');setTimeout(()=>d.classList.remove('shake'),500);});
        earnDiamondsFromMiss(isP2turn?'cpu':'you');
        const diaCount2=dice.filter(d=>d.face==='◆').length;
        const diaMsg2=diaCount2>0?` · ${diaCount2} ◆ verdient`:'';
        showBanner('YOLO! Aber du spielst normal'+diaMsg2,'','var(--muted)');
        const activeDia2=(isP2turn?cpuDiamonds:youDiamonds)-diaEarnedThisTurn;
        if(activeDia2>=1){
          showMsg('◆ einsetzen oder Zug beenden?');
          showDiaOrEndChoice();
        } else {
          showMsg(MISS_MSGS[Math.floor(Math.random()*MISS_MSGS.length)]);
          setTimeout(()=>endPlayerTurn(false), 700);
        }
        return;
      }
      const rem=3-attempts;
      showMsg('YOLO! Aber du spielst normal – '+rem+' Versuch'+(rem!==1?'e':'')+' verbleibend');
      return;
    }
    const isP2 = (gameMode==='human' && turnPhase==='cpu');
    document.getElementById('yoloStrip').classList.add('matched');
    showBanner('✦ YOLO ✦','yolo-r');
    showMsg((turnPhase==='player'?'Spieler 1':'Spieler 2')+': YOLO! Alle 3 Karten!');
    playYolo();
    const yoloTab = isP2 ? cpuTableau : youTableau;
    table.forEach(card=>{if(card)placeCard(yoloTab,card);});
    checkSofortBonuses(isP2?'cpu':'you');
    spawnConfetti();
    setTimeout(()=>endPlayerTurn(true), 4000);
    return;
  }

  // Card match?
  const matches=table.map((card,i)=>card&&facesMatch(card.combo,faces)?{card,i}:null).filter(Boolean);
  if(matches.length>0){
    const targetTableau = isP2turn ? cpuTableau : youTableau;
    const targetWho = isP2turn ? 'cpu' : 'you';

    // Always let the player choose — whether rolls remain or not
    showCardChoicePopup(matches, targetTableau, targetWho, attempts < 3);
    document.getElementById('btnRoll').disabled = true;
    return;
  }

  if(attempts>=3){
    playMiss();
    document.querySelectorAll('.die').forEach(d=>{
      d.classList.add('shake');
      setTimeout(()=>d.classList.remove('shake'),500);
    });
    // Earn diamonds first
    const isP2miss = (gameMode==='human' && turnPhase==='cpu');
    earnDiamondsFromMiss(isP2miss ? 'cpu' : 'you');
    const diaCount=dice.filter(d=>d.face==='◆').length;
    const diaMsg=diaCount>0?` · ${diaCount} ◆ verdient`:'';
    const activeDia = isP2miss ? cpuDiamonds : youDiamonds;
    const endMissTurn = isP2miss ? ()=>endPlayerTurn(false) : ()=>endPlayerTurn(false);
    // Can use diamonds if they have any that were earned in a PREVIOUS turn
    const diaAvailableToUse = activeDia - diaEarnedThisTurn;
    if(diaAvailableToUse >= 1){
      showBanner('Kein Treffer'+diaMsg,'','var(--muted)');
      showMsg('◆ einsetzen oder Zug beenden?');
      showDiaOrEndChoice();
    } else {
      showBanner('Kein Treffer'+diaMsg,'','var(--muted)');
      showMsg(MISS_MSGS[Math.floor(Math.random()*MISS_MSGS.length)]);
      setTimeout(endMissTurn, 700);
    }
    return;
  }

  const rem=3-attempts;
  showMsg(`${rem} Versuch${rem>1?'e':''} verbleibend`);
}

function endPlayerTurn(wasYolo){
  // ── Schritt 1: Spielerwechsel sofort (OHNE neue Karten) ──
  diaEarnedThisTurn=0;
  newTableSlots.clear();
  const ys=document.getElementById('yoloStrip');
  if(ys) ys.classList.remove('matched');
  dice=dice.map(d=>({face:d.face,held:false}));
  attempts=0;
 
  turnPhase=(turnPhase==='player')?'cpu':'player';
  updateTurnBadge();
  renderDice();
  renderTableaux();
  renderBonuses();
  updateScores();
  updatePips();
  updateDiamondBar();
  resetBanner();
  document.getElementById('btnRoll').disabled=false;
  showMsg(turnPhase==='player'?ROLL_MSGS_P1[Math.floor(Math.random()*ROLL_MSGS_P1.length)]:ROLL_MSGS_P2[Math.floor(Math.random()*ROLL_MSGS_P2.length)]);

  // ── Schritt 2: Neue Karten erst nach 700ms einblenden ──
  setTimeout(()=>{
    if(wasYolo){
      if(deck.length>=3){
        table=[deck.pop(),deck.pop(),deck.pop()];
        tableRotations=[Math.random()*6-3,Math.random()*6-3,Math.random()*6-3];
        newTableSlots=new Set([0,1,2]);
      } else {table=[];checkGameEnd();return;}
    } else {
      for(let i=0;i<table.length;i++){
        if(table[i]===null){
          table[i]=deck.length>0?deck.pop():null;
          tableRotations[i]=Math.random()*6-3;
          if(table[i]) newTableSlots.add(i);
        }
      }
    }
    if(!canRefill()){checkGameEnd();return;}
    renderCards();
    updateDeckInfo();
  }, 700);
}

function canRefill(){
  // Count how many non-null cards will be in table after refill
  const currentCards = table.filter(c=>c!==null).length;
  const nullSlots = table.filter(c=>c===null).length;
  const cardsAfterRefill = currentCards + Math.min(nullSlots, deck.length);
  return cardsAfterRefill >= 3;
}

// ── SOUND ENGINE (Web Audio API, no files needed) ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx = null;
function getCtx(){
  if(!ctx) ctx = new AudioCtx();
  if(ctx.state==='suspended') ctx.resume();
  return ctx;
}

function playRoll(){
  // Rattling dice: short noise bursts
  const ac = getCtx();
  const count = 4 + Math.floor(Math.random()*3);
  for(let i=0;i<count;i++){
    const t = ac.currentTime + i*0.045 + Math.random()*0.02;
    const buf = ac.createBuffer(1, ac.sampleRate*0.04, ac.sampleRate);
    const data = buf.getChannelData(0);
    for(let j=0;j<data.length;j++) data[j]=(Math.random()*2-1)*Math.exp(-j/(data.length*0.3));
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.18 + Math.random()*0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.04);
    // Band-pass for wooden/plastic die feel
    const filter = ac.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800 + Math.random()*600;
    filter.Q.value = 1.5;
    src.connect(filter);filter.connect(gain);gain.connect(ac.destination);
    src.start(t);src.stop(t+0.045);
  }
}

function playHold(){
  // Soft click - placing die down
  const ac = getCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(300, ac.currentTime+0.06);
  gain.gain.setValueAtTime(0.12, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.08);
  osc.connect(gain);gain.connect(ac.destination);
  osc.start();osc.stop(ac.currentTime+0.09);
}

function playRelease(){
  // Higher click - picking die back up
  const ac = getCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(900, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(500, ac.currentTime+0.05);
  gain.gain.setValueAtTime(0.08, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.07);
  osc.connect(gain);gain.connect(ac.destination);
  osc.start();osc.stop(ac.currentTime+0.08);
}

function playSuccess(){
  // Bright two-tone chime
  const ac = getCtx();
  [[523,0],[659,0.12],[784,0.24]].forEach(([freq,delay])=>{
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t = ac.currentTime + delay;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.35);
    osc.connect(gain);gain.connect(ac.destination);
    osc.start(t);osc.stop(t+0.36);
  });
}

function playYolo(){
  // Dramatic ascending fanfare + noise burst
  const ac = getCtx();
  // Ascending notes
  [[261,0],[329,0.1],[392,0.2],[523,0.3],[659,0.4],[784,0.5]].forEach(([freq,delay])=>{
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    const t = ac.currentTime + delay;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.15, t+0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.3);
    const filter = ac.createBiquadFilter();
    filter.type='lowpass';filter.frequency.value=2000;
    osc.connect(filter);filter.connect(gain);gain.connect(ac.destination);
    osc.start(t);osc.stop(t+0.31);
  });
  // Noise burst at peak
  const buf = ac.createBuffer(1, ac.sampleRate*0.15, ac.sampleRate);
  const data = buf.getChannelData(0);
  for(let j=0;j<data.length;j++) data[j]=(Math.random()*2-1)*Math.exp(-j/(data.length*0.4));
  const src = ac.createBufferSource();src.buffer=buf;
  const ng = ac.createGain();ng.gain.setValueAtTime(0.25, ac.currentTime+0.5);
  ng.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.65);
  src.connect(ng);ng.connect(ac.destination);
  src.start(ac.currentTime+0.5);src.stop(ac.currentTime+0.66);
}

function playMiss(){
  // Low thud
  const ac = getCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(120, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, ac.currentTime+0.2);
  gain.gain.setValueAtTime(0.2, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.22);
  osc.connect(gain);gain.connect(ac.destination);
  osc.start();osc.stop(ac.currentTime+0.23);
}

function checkPlayerResultAfterDia(){
  try {
    const faces = dice.map(d => d.face).filter(Boolean);
    if(faces.length < 4){ showMsg('Fehler: Würfel nicht vollständig'); return; }

    const isP2 = (gameMode==='human' && turnPhase==='cpu');
    const activeTab = isP2 ? cpuTableau : youTableau;
    const activeWho = isP2 ? 'cpu' : 'you';
    const endFn = isP2 ? ()=>endPlayerTurn(false) : ()=>endPlayerTurn(false);

    // YOLO?
    if(isYolo(faces)){
      document.getElementById('yoloStrip').classList.add('matched');
      showBanner('✦ YOLO ✦','yolo-r');
      showMsg((turnPhase==='player'?'Spieler 1':'Spieler 2')+': YOLO! Alle 3 Karten!');
      playYolo();
      table.forEach(card=>{ if(card) placeCard(activeTab, card); });
      checkSofortBonuses(activeWho);
      isP2 ? endPlayerTurn(true) : endPlayerTurn(true);
      spawnConfetti();
      return;
    }

    // Card match?
    const matches = [];
    table.forEach((card, i) => {
      if(card && facesMatch(card.combo, faces)) matches.push({card, i});
    });

    if(matches.length > 0){
      // Let player choose even after diamond re-roll (no keep-rolling option)
      showCardChoicePopup(matches, activeTab, activeWho, false);
      return;
    }

    // No match
    playMiss();
    showBanner('Kein Treffer', '', 'var(--muted)');
    showMsg('Diamant verbraucht – nächster Spieler');
    setTimeout(endFn, 700);

  } catch(e) {
    console.error('checkPlayerResultAfterDia error:', e);
    showMsg('Fehler – Zug wird beendet');
    setTimeout(()=>endPlayerTurn(false), 500);
  }
}

// Score tableau with diamond-unlocked rows
function scoreTableauWithDia(tableau, diamonds, trackFor){
  const cols=['red','yellow','blue'];
  const maxR=Math.max(0,...cols.map(c=>(tableau[c]||[]).length));
  let total=0, diasLeft=Math.floor(diamonds/3), rowsUnlocked=0;
  for(let r=0;r<maxR;r++){
    const row=cols.map(c=>(tableau[c]||[])[r]).filter(Boolean);
    if(row.length===3) total+=row.reduce((s,c)=>s+c.pts,0);
    else if(row.length===2&&diasLeft>0){
      diasLeft--;
      rowsUnlocked++;
      total+=row.reduce((s,c)=>s+c.pts,0);
    }
  }
  if(trackFor==='you') youDiaRows=rowsUnlocked;
  if(trackFor==='cpu') cpuDiaRows=rowsUnlocked;
  return total;
}

    const tabEl=document.getElementById(tabId);
    if(tabEl) tabEl.querySelectorAll('.tableau-col').forEach(colEl=>{
      const cards=colEl.querySelectorAll('.t-card');
      if(cards.length>0) cards[cards.length-1].classList.add('new-card');
    });
  }, 700);
  setTimeout(()=>endPlayerTurn(false), 1500);
}

function keepRollingChoice(){
  hideCardChoicePopup();
  // Player keeps their dice and rolls again
}




function showModeScreen(){
  document.getElementById('gameOverModal').classList.remove('show');
  document.body.style.background = '#ff2dac';
  const splash = document.getElementById('splashScreen');
  if(splash){
    renderSplashTitle();
    sizeSplashAndTutorial();
    splash.style.opacity='0';
    splash.style.display='flex';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      splash.style.transition='opacity .3s ease';
      splash.style.opacity='1';
    }));
  }
}

// Game starts via splash → tutorial → startGame()
